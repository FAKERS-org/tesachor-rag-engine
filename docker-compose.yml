version: '3.8'

services:
  app:
    build: ./services/api
    ports:
      - "8000:8000"
    environment:
      - PGVECTOR_DSN=postgresql://user:pass@postgres:5432/rag
      - REDIS_URL=redis://redis:6379
      - EMBEDDING_SERVICE_URL=http://embedding:8080
    depends_on:
      - postgres
      - redis
      - embedding
  
  # workser for ingestion
  ingestion_worker:
    build: ./services/ingestion
    command: celery -A worker worker --loglevel=info --concurrency=4
    environment:
      - PGVECTOR_DSN=postgresql://user:pass@postgres:5432/rag
      - EMBEDDING_SERVICE_URL=http://embedding:8080
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - embedding
    deploy:
      replicas: 2
  
  # emdedding service
  embedding:
    build: ./services/embedding
    ports:
      - "8080:8080"
    environment:
      - MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # postgres database
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=rag
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/data

  # pgadmin for db management
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tesachor.com
      PGADMIN_DEFAULT_PASSWORD: tesachor123
    ports:
      - "5050:80"  # Changed from 80:80
    volumes:
      - ./pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres:
          condition: service_healthy
    
  # cache and task q
  redis:
    image: redis:7-alphine
    ports:
      - "6379:6379"
    
  # mlfow
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    command: mlflow server --host 0.0.0.0 --backend-store-uri postgresql://user:pass@postgres:5432/mlflow
    ports:
      - "5000:5000"
    depends_on:
      - postgres
  
  # lakeFS for dv
  lakefs:
    image: treeverse/lakefs:latest
    ports:
      - "8001:8000"
    environment:
      - LAKEFS_BLOCKSTORE_TYPE=local
      - LAKEFS_BLOCKSTORE_LOCAL_PATH=/data/lakefs
    volumnes:
      - lakefs_data:/data/lakefs

  # pomethues for metrics
  prometheus:
    image: prom/prometheus
    volumes:
      - ./services/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  
  # grafana for dashboard
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./services/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards

volumes:
  pg_data:
  lakefs_data: